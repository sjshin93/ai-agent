<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Flutter Web + FastAPI compose sample">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flutter + FastAPI</title>
</head>
<body>
  <div id="cf-turnstile-container" style="position:absolute;left:-9999px;top:-9999px;"></div>
  <script>
    (function () {
      let siteKey = '';
      let token = '';
      let widgetId = null;
      const isMobileWebKit =
        /iPhone|iPad|iPod/i.test(navigator.userAgent || '') &&
        /AppleWebKit/i.test(navigator.userAgent || '');

      function clearToken() {
        token = '';
      }

      function canRender() {
        return !!siteKey && typeof window.turnstile !== 'undefined';
      }

      function render() {
        if (!canRender()) {
          return false;
        }
        const selector = '#cf-turnstile-container';
        if (widgetId !== null) {
          try {
            window.turnstile.remove(widgetId);
          } catch (e) {}
          widgetId = null;
        }
        clearToken();
        const container = document.getElementById('cf-turnstile-container');
        if (container) {
          container.style.position = 'fixed';
          container.style.left = '50%';
          container.style.bottom = '16px';
          container.style.top = 'auto';
          container.style.transform = 'translateX(-50%)';
          container.style.zIndex = '9999';
        }
        widgetId = window.turnstile.render(selector, {
          sitekey: siteKey,
          size: 'normal',
          callback: function (value) {
            token = value || '';
            console.log('Turnstile callback token:', token);
          },
          'expired-callback': function () {
            clearToken();
          },
          'error-callback': function () {
            clearToken();
          }
        });
        return true;
      }

      window.__cfTurnstileBridge = {
        isManualMode: function () {
          return isMobileWebKit;
        },
        setSiteKey: function (value) {
          siteKey = (value || '').trim();
          clearToken();
          if (!siteKey) {
            return;
          }
          render();
        },
        getToken: function () {
          if (token) {
            return token;
          }
          if (widgetId !== null && typeof window.turnstile !== 'undefined') {
            const response = window.turnstile.getResponse(widgetId) || '';
            if (response) {
              token = response;
              return token;
            }
          }
          return '';
        },
        execute: function () {
          if (!siteKey) {
            return false;
          }
          if (widgetId === null && !render()) {
            return false;
          }
          if (typeof window.turnstile === 'undefined') {
            return false;
          }
          window.turnstile.execute(widgetId);
          return true;
        },
        reset: function () {
          clearToken();
          if (widgetId === null || typeof window.turnstile === 'undefined') {
            return;
          }
          window.turnstile.reset(widgetId);
        }
      };
    })();
  </script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
